    // Styling rules based on features
    function getFeatureStyle(feature) {
      const type = feature.properties.type;
      switch (type) {
        case 'building_ntnu':
          return {
            fillColor: '#0284c7',
            fillOpacity: 0.75,
            color: '#38bdf8',
            weight: 1.5,
            opacity: 1
          };
        case 'building_other':
          return {
            fillColor: '#334155',
            fillOpacity: 0.5,
            color: '#475569',
            weight: 0.5,
            opacity: 0.6
          };
        case 'greenery':
          return {
            fillColor: '#065f46',
            fillOpacity: 0.6,
            color: '#059669',
            weight: 0,
            opacity: 0
          };
        case 'sport_track':
          return {
            fillColor: '#991b1b',
            fillOpacity: 0.7,
            color: '#ef4444',
            weight: 1,
            opacity: 0.8
          };
        case 'sport_pitch':
          return {
            fillColor: '#115e59',
            fillOpacity: 0.75,
            color: '#14b8a6',
            weight: 0.5,
            opacity: 0.8
          };
        case 'water':
          return {
            fillColor: '#0369a1',
            fillOpacity: 0.8,
            color: '#0ea5e9',
            weight: 0.5,
            opacity: 1
          };
        case 'road':
          return {
            color: feature.properties.tags.highway === 'primary' || feature.properties.tags.highway === 'secondary' ? '#475569' : '#334155',
            weight: feature.properties.tags.highway === 'primary' || feature.properties.tags.highway === 'secondary' ? 4 : 2,
            opacity: 0.8
          };
        case 'campus_ground':
          return {
            fillColor: '#1e293b',
            fillOpacity: 0.2,
            color: '#0ea5e9',
            weight: 1.5,
            dashArray: '5, 5',
            opacity: 0.7
          };
        default:
          return {
            fillColor: '#475569',
            fillOpacity: 0.2,
            color: '#64748b',
            weight: 1,
            opacity: 0.5
          };
      }
    }

    // Interactivity
    function onEachFeature(feature, layer) {
      const props = feature.properties;
      const type = props.type;
      
      // Bind popups to buildings and facilities
      if (type.startsWith('building_ntnu') || type.startsWith('sport') || type === 'water') {
        let popupContent = `<div class="popup-title">${props.name}</div>`;
        
        if (props.tags.building) {
          popupContent += `<div class="popup-desc">地標類型：校區大樓 (${props.tags.building})</div>`;
        } else if (props.tags.leisure) {
          popupContent += `<div class="popup-desc">體育設施：${props.tags.leisure} (${props.tags.sport || '綜合'})</div>`;
        }
        
        layer.bindPopup(popupContent);
        
        // Highlight on hover
        layer.on({
          mouseover: function(e) {
            const l = e.target;
            l.setStyle({
              fillOpacity: 0.9,
              weight: 2.5,
              color: '#38bdf8'
            });
            l.openTooltip();
          },
          mouseout: function(e) {
            geoJsonLayer.resetStyle(e.target);
            e.target.closeTooltip();
          }
        });
        
        // Add simple tooltip for quick hover identification
        layer.bindTooltip(props.name, {
          permanent: false,
          direction: 'center',
          className: 'leaflet-tooltip-own'
        });
      }
    }

    // Draw GeoJSON layer
    const geoJsonLayer = L.geoJSON(geojsonData, {
      style: getFeatureStyle,
      onEachFeature: onEachFeature
    }).addTo(map);

    // Draw manual campus dashed polygons to emphasize 校本部 and 圖書館校區
    const hq1 = L.polygon([
      [25.0264, 121.5268], [25.0264, 121.5284], [25.0248, 121.5286], 
      [25.0248, 121.5273], [25.0252, 121.5268]
    ], {
      color: '#0ea5e9',
      weight: 1.5,
      dashArray: '5, 5',
      fillColor: '#1e293b',
      fillOpacity: 0.15,
      interactive: false
    }).addTo(map);
    
    const hq2 = L.polygon([
      [25.0269, 121.5270], [25.0269, 121.5292], [25.0282, 121.5292], 
      [25.0282, 121.5270]
    ], {
      color: '#0ea5e9',
      weight: 1.5,
      dashArray: '5, 5',
      fillColor: '#1e293b',
      fillOpacity: 0.15,
      interactive: false
    }).addTo(map);
